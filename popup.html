<!-- popup.html -->
<!DOCTYPE html>
<html>
<head>
  <title>Bio_Vault</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
      --panel-bg: #ffffff;
      --accent: #2563eb;
      --accent-soft: rgba(37, 99, 235, 0.1);
      --text-dark: #1e293b;
      --text-light: #64748b;
      --border: #d1d5db;
      --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      --radius: 12px;
    }

    body {
      width: 340px;
      margin: 0;
      padding: 20px;
      font-family: 'Inter', sans-serif;
      background: var(--bg-gradient);
      color: var(--text-dark);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .app-container {
      background: var(--panel-bg);
      padding: 24px;
      border-radius: 16px;
      box-shadow: var(--shadow);
      width: 100%;
      border: 1px solid rgba(255,255,255,0.7);
    }

    h2 {
      font-family: 'Orbitron', sans-serif;
      font-size: 24px;
      letter-spacing: 1.5px;
      margin-bottom: 4px;
      text-align: center;
      background: linear-gradient(90deg, #2563eb, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .sub {
      text-align: center;
      font-size: 12px;
      color: var(--text-light);
      margin-bottom: 20px;
    }

    .badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 8px;
      padding: 8px 12px;
      margin-bottom: 16px;
      font-size: 12px;
      color: #166534;
    }

    h3 {
      font-size: 13px;
      color: var(--text-light);
      font-weight: 600;
      margin: 0 0 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .password-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      margin-bottom: 12px;
    }
    .password-wrapper input { margin-bottom: 0; padding-right: 40px; }

    .toggle-password {
      position: absolute;
      right: 12px;
      cursor: pointer;
      color: var(--text-light);
      display: flex;
      align-items: center;
      background: none;
      border: none;
      padding: 0;
      width: auto;
      margin: 0;
    }
    .toggle-password:hover { color: var(--accent); }

    input {
      width: 100%;
      padding: 11px 14px;
      margin: 0 0 12px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s ease;
    }
    input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }

    button {
      width: 100%;
      padding: 13px;
      margin: 5px 0;
      border: none;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: 'Orbitron', sans-serif;
      letter-spacing: 0.3px;
      transition: all 0.18s ease;
    }

    .primary-btn { background: var(--accent); color: white; }
    .primary-btn:hover { background: #1d4ed8; }
    .secondary-btn { background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }
    .secondary-btn:hover { background: #e8eef6; }
    .back-btn { background: transparent; color: var(--text-light); font-size: 12px; padding: 10px; }

    .divider {
      display: flex; align-items: center;
      margin: 12px 0; color: var(--text-light); font-size: 11px;
    }
    .divider::before, .divider::after {
      content: ""; flex: 1; height: 1px; background: #e2e8f0; margin: 0 10px;
    }

    .reg-link {
      display: block; text-align: center;
      margin-top: 14px; font-size: 13px;
      color: var(--accent); text-decoration: none; font-weight: 500;
    }

    .hidden { display: none !important; }
    .section { animation: up 0.25s ease-out; }
    @keyframes up { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  </style>
</head>
<body>
<div class="app-container">
  <h2>BioVault</h2>

  <!-- ── SCREEN: LOGIN ─────────────────────────────────── -->
  <div id="loginScreen" class="hidden section">
    <p class="sub">Sign in to your vault</p>
    <input type="text"     id="loginUsername" placeholder="Username" />
    <div class="password-wrapper">
      <input type="password" id="loginPassword" placeholder="Master Password" />
      <button type="button" class="toggle-password" data-target="loginPassword">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
    <button id="loginSubmitBtn" class="primary-btn">
      <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      Login
    </button>
    <div class="divider">OR</div>
    <button id="loginFaceBtn" class="secondary-btn">
      <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M6 20v-2a6 6 0 0 1 12 0v2"/></svg>
      Login with Face
    </button>
    <a id="registerLink" href="#" class="reg-link">New User? Create Account</a>
  </div>

  <!-- ── SCREEN: MAIN (post-login) ────────────────────── -->
  <div id="mainScreen" class="hidden section">
    <div class="badge">
      <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      Logged in as <strong id="loggedInBadge"></strong>
    </div>
    <button id="savePasswordBtn" class="primary-btn">
      <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      Save Password
    </button>
    <div class="divider">OR</div>
    <button id="accessPasswordBtn" class="secondary-btn">
      <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      Open Vault
    </button>
    <button id="logoutBtnPopup" class="back-btn">↩ Logout</button>
  </div>

  <!-- ── SCREEN: SAVE CREDENTIAL ──────────────────────── -->
  <div id="saveScreen" class="hidden section">
    <h3>Save New Credential</h3>
    <input type="text"     id="domain"       placeholder="Domain (e.g. google.com)" />
    <input type="text"     id="siteUsername"  placeholder="Email / Username for this site" />
    <div class="password-wrapper">
      <input type="password" id="password" placeholder="Password" />
      <button type="button" class="toggle-password" data-target="password">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
    <button id="saveCredentialBtn" class="primary-btn">Save Securely</button>
    <button id="backToMainFromSave" class="back-btn">← Back</button>
  </div>

  <!-- ── SCREEN: OPEN VAULT (re-verify, user already known) ── -->
  <div id="accessScreen" class="hidden section">
    <h3>Verify to Open Vault</h3>
    <div class="password-wrapper">
      <input type="password" id="masterPassword" placeholder="Enter Master Password" />
      <button type="button" class="toggle-password" data-target="masterPassword">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
    <button id="submitMasterPassword" class="primary-btn">Unlock Vault</button>
    <div class="divider">OR</div>
    <button id="faceLockBtn" class="secondary-btn">
      <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M6 20v-2a6 6 0 0 1 12 0v2"/></svg>
      Face Lock
    </button>
    <button id="backToMainFromAccess" class="back-btn">← Back</button>
  </div>

  <!-- ── SCREEN: REGISTER ─────────────────────────────── -->
  <div id="registerScreen" class="hidden section">
    <h3>Create Your Vault</h3>
    <input type="text" id="regUsername" placeholder="Choose a Username" />
    <div class="password-wrapper">
      <input type="password" id="regMasterPassword" placeholder="Set Master Password" />
      <button type="button" class="toggle-password" data-target="regMasterPassword">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
    <div class="password-wrapper">
      <input type="password" id="regConfirmPassword" placeholder="Confirm Password" />
      <button type="button" class="toggle-password" data-target="regConfirmPassword">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
    <button id="createAccountBtn" class="primary-btn">Create Vault</button>
    <button id="registerFaceBtn" class="secondary-btn">Set Up Face Lock</button>
    <button id="backToLoginFromRegister" class="back-btn">← Back to Login</button>
  </div>

</div>
<script defer src="popup.js"></script>
</body>
</html>
