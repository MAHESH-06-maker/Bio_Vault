<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Face Login</title>

body { font-family: Arial; background:white; color:black; text-align:center; }
video { width:300px; border:2px solid #444; border-radius:10px; transform: scaleX(-1);}
