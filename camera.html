<!-- camera.html -->
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Face Login - Bio_Vault</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <script src="face-api.min.js"></script>
  <script defer src="camera.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Orbitron', sans-serif;
    }

    :root {
      --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
      --panel-bg: #ffffff;
      --accent: #2563eb;
      --accent-soft: rgba(37, 99, 235, 0.1);
      --text-dark: #1e293b;
      --text-light: #64748b;
      --border: #d1d5db;
      --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      --radius: 12px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-gradient);
      color: var(--text-dark);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      background: var(--panel-bg);
      padding: 28px;
      border-radius: 16px;
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 420px;
      border: 1px solid rgba(255, 255, 255, 0.7);
      text-align: center;
    }

    h2 {
      font-family: 'Orbitron', sans-serif;
      font-size: 26px;
      letter-spacing: 1.5px;
      margin-bottom: 6px;
      background: linear-gradient(90deg, #2563eb, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 10px rgba(37, 99, 235, 0.3);
    }

    .subtitle {
      color: var(--text-light);
      margin-bottom: 20px;
      font-size: 14px;
    }

    #status {
      font-size: 14px;
      margin: 12px 0;
      min-height: 20px;
      font-weight: 500;
    }

    .video-wrapper {
      position: relative;
      display: flex;
      justify-content: center;
    }

    video {
      width: 100%;
      max-width: 320px;
      border-radius: 16px;
      margin: 15px 0;
      border: 2px solid var(--border);
      box-shadow: 0 0 0 4px var(--accent-soft);
      transform: scaleX(-1);
    }

    .scanner {
      position: absolute;
      width: 80%;
      height: 2px;
      top: 50%;
      left: 10%;
      background: linear-gradient(90deg, transparent, #2563eb, transparent);
      animation: scan 2s linear infinite;
    }

    @keyframes scan {
      0%   { transform: translateY(-120px); }
      100% { transform: translateY(120px); }
    }

    input {
      width: 100%;
      padding: 12px 14px;
      margin: 10px 0;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      transition: all 0.2s ease;
      font-family: 'Inter', sans-serif;
    }

    input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-soft);
    }

    button {
      width: 100%;
      padding: 14px;
      margin: 8px 0;
      border: none;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: 'Orbitron', sans-serif;
    }

    #loginBtn {
      background: var(--accent);
      color: white;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
    }

    #loginBtn:hover:not(:disabled) { background: #1d4ed8; }

    #registerBtn {
      background: #f1f5f9;
      color: #475569;
      border: 1px solid #e2e8f0;
    }

    #registerBtn:hover { background: #e2e8f0; }

    #loginBtn:disabled {
      background: #cbd5f5;
      cursor: not-allowed;
      box-shadow: none;
    }

    /* Hide name input — face registration is tied to loggedUser / account */
    #name { display: none; }

    .footer {
      margin-top: 15px;
      font-size: 12px;
      color: var(--text-light);
    }
  </style>
</head>

<body>
  <div class="container">
    <h2>Face Login</h2>
    <p class="subtitle">BioVault — Secure Face Authentication</p>

    <p id="status">Loading models...</p>

    <div class="video-wrapper">
      <video id="video" autoplay muted></video>
      <div class="scanner"></div>
    </div>

    <!-- Hidden — username is read from account/loggedUser, never entered manually -->
    <input type="text" id="name" placeholder="Username (hidden)" />

    <button id="registerBtn">Register Face</button>
    <button id="loginBtn" disabled>Login with Face</button>

    <div class="footer">Look directly at the camera</div>
  </div>
</body>
</html>
