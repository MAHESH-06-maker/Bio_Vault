<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BioVault Settings</title>
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <main class="page-shell">
      <section class="hero-card">
        <p class="eyebrow">BioVault Extension</p>
        <h1>Connection Settings</h1>
        <p class="lede">Configure the API host and a preferred username for the login screen. Authentication and derived keys stay session-only.</p>
      </section>

      <section class="panel">
        <form id="settings-form" class="stack">
          <label class="field">
            <span>API Base URL</span>
            <input id="api-base-url" name="apiBaseUrl" type="url" placeholder="http://127.0.0.1:8000" required>
          </label>

          <label class="field">
            <span>Preferred Username</span>
            <input id="username" name="username" type="text" placeholder="alice">
          </label>

          <div class="actions">
            <button type="submit" class="primary-button">Save Settings</button>
            <button type="button" id="reset-button" class="ghost-button">Reset</button>
          </div>
        </form>

        <p id="status" class="status-line" role="status"></p>
      </section>
    </main>

    <script type="module" src="options.js"></script>
  </body>
</html>
